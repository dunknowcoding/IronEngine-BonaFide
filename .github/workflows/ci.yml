name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.os }} · py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}

      - name: Install (CPU backend only)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Smoke import
        run: |
          python -c "import ironengine_bonafide; print('OK', ironengine_bonafide.__version__)"

      - name: Lint
        run: |
          pip install ruff
          ruff check src/

      - name: Tests (CPU backend)
        env:
          BONAFIDE_BACKEND: cpu
        run: |
          pytest -q

      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
